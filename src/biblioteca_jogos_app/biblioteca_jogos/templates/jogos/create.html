<!doctype html>
<html>
<head>
    <title>Cadastrar Jogo</title>
</head>

<body>

<h1>Cadastrar Jogo</h1>

<form method="post">

    <label>Nome:</label>
    <input name="nome">

    <br><br>

    <label>Plataforma:</label>
    <input name="plataforma">

    <br><br>

    <label>Gênero:</label>

    <br><br>

    <label>Status:</label>

    <br><br>

    <button type="submit">Salvar</button>

</form>

</body>
</html>
