<!doctype html>
<html>
<head>
    <title>Biblioteca de Jogos</title>
</head>

<body>

<h1>Biblioteca de Jogos</h1>

<a href="/criar">Cadastrar novo jogo</a>

<h2>Jogos cadastrados:</h2>

<ul>
{% for jogo in jogos %}
    <li>
        {{ jogo.nome }} -
        {{ jogo.plataforma }} -
        {{ jogo.genero }} -
        {{ jogo.status }}
    </li>
{% endfor %}
</ul>

</body>
</html>
